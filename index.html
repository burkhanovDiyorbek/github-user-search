<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devfinder</title>
    <link rel="stylesheet" href="./css/index.css">
</head>
<body>
    <div class="container">
        <div class="container-header">
            <h1>devfinder</h1>
            <p>DARK <img src="./img/icons/moon.svg" alt="moon"></p>
        </div>
        <div class="container-search">
            <img src="./img/icons/search.svg" alt="search">
            <input type="text" placeholder="Search GitHub username…">
            <button>Search</button>
        </div>
        <div class="container-main">
            <div class="container-main_picture">
                <img src="./img/bitmap.png" alt="bitmap">
            </div>
            <div class="container-main_text">
                    <div class="container-main_text--header">
                        <div>
                            <h2>The Octocat</h2>
                            <a href="#">@octocat</a>
                        </div>
                        <p>Joined 25 Jan 2011</p>
                    </div>
            </div>
            <div class="tablet"></div>
            <div class="container-main_info">                    
                    <p>This profile has no bio</p>
                    <div class="container-main_text--statistics">
                        <div>
                            <span>Repos</span>
                            <h3>8</h3>
                        </div>
                        <div>
                            <span>Followers</span>
                            <h3>3938</h3>
                        </div>
                        <div>
                            <span>Following</span>
                            <h3>9</h3>
                        </div>
                    </div>
                    <div class="container-main_text--links">
                        <div>
                            <p><img src="./img/icons/location.svg" alt="location"><a href="#">San Francisco</a></p>
                            <p><img src="./img/icons/link.svg" alt="link"><a href="#">https://github.blog</a></p>
                        </div>
                        <div>                        
                            <p class="not-information"><img src="./img/icons/x.svg" alt="x (twitter)" ><a href="#">Not Avaible</a></p>
                            <p><img src="./img/icons/office.svg" alt="office"><a href="#">@github</a></p>
                        </div>
                    </div>
            </div>
        </div>
    </div>
</body>
</html>
